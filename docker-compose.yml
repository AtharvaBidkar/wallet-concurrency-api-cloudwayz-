version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wallet_db
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walletdb"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: wallet_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/walletdb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
